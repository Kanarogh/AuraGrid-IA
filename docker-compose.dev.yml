# Desenvolvimento local: só infra (Postgres + MinIO). App roda com `npm run dev`.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auragrid
      POSTGRES_PASSWORD: auragrid
      POSTGRES_DB: auragrid
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auragrid -d auragrid"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: auragrid
      MINIO_ROOT_PASSWORD: auragridsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 auragrid auragridsecret &&
      mc mb -p local/auragrid-media || true &&
      mc anonymous set none local/auragrid-media || true
      "

volumes:
  pg_data:
  minio_data:
